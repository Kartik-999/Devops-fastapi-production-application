name: "cicd"

on:
  push:
    branches: CICD

jobs:
  login:
    runs-on: ubuntu-latest
    env:
          YourDbPassword: ${{secrets.mydbpassword}}
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v1
        with:
          username: ${{secrets.Docker_username}}
          password: ${{secrets.Docker_password}}
      - name: building docker compose
        run: "docker compose build"
      - name: Run our build
        run: "docker compose up -d"
      
      - name: deploy to EC2
        run: |
          echo "${{secrets.pem_key}}" 1>key.pem
          chmod 600 key.pem
          ssh -o StrictHostKeyChecking=no -i key.pem ${{secrets.EC2_user}}@${{secrets.EC2_IP}} "cd ~/student-api && git pull origin CICD && docker compose down && docker compose up --build -d"
          rm -rf key.pem